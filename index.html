<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lowadi | Kaneri Mio Company</title>
  <style>
    :root {
      --bg-color: #f7ede2;
      --header-bg: #4a2810;
      --btn-active: #84522b;
      --btn-inactive: #eee4dc;
      --text-main: #2b2d42;
      --card-bg: #ffffff;
      --tag-black-market: #a3704c;
      --tag-currency: #5bc0be;
      --tag-colors: #cfa846;
      --tag-other: #6c757d;
      --section-bg: #fdfaf7;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      margin: 0;
      background-color: var(--bg-color);
      color: var(--text-main);
      overflow-x: hidden;
    }

    header {
      background-color: var(--header-bg);
      color: #fff;
      padding: 15px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 18px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px 15px;
    }

    /* Единая поисковая панель */
    .search-panel {
      background: #fff;
      padding: 10px 15px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      align-items: center;
      margin-bottom: 20px;
    }

    .search-input {
      flex: 1;
      min-width: 200px;
      padding: 10px;
      border: none;
      font-size: 14px;
      outline: none;
    }

    /* Блок фильтров внутри поиска */
    .search-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .search-select {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background-color: #fff;
      font-size: 13px;
      outline: none;
      color: #4a2a16;
      cursor: pointer;
    }

    .search-checkbox-label {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      font-weight: 500;
      color: #4a2a16;
      cursor: pointer;
      user-select: none;
      background: var(--btn-inactive);
      padding: 8px 12px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .search-checkbox-label:has(input:checked) {
      background: var(--btn-active);
      color: #fff;
    }

    .search-checkbox-label input {
      display: none;
    }

    /* Категории под поиском */
    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      overflow-x: auto;
    }

    .filter-btn {
      background-color: var(--btn-inactive);
      color: #4a2a16;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      white-space: nowrap;
    }

    .filter-btn.active {
      background-color: var(--btn-active);
      color: #fff;
    }

    /* Сетка карточек */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background-color: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
      cursor: pointer;
      transition: transform 0.2s;
    }

    .card:hover { transform: translateY(-2px); }

    .image-wrapper {
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card img {
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
    }

    .card-body {
      padding: 20px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      border-top: 1px solid #f0f0f0;
    }

    /* Тег категории на карточке */
    .tag {
      align-self: flex-start;
      font-size: 10px;
      font-weight: bold;
      text-transform: uppercase;
      padding: 4px 8px;
      border-radius: 4px;
      color: #fff;
      margin-bottom: 12px;
    }
    .tag.черный-рынок { background-color: var(--tag-black-market); }
    .tag.валюта { background-color: var(--tag-currency); }
    .tag.окрасы { background-color: var(--tag-colors); }
    .tag.другое { background-color: var(--tag-other); }

    .card-title {
      font-size: 18px;
      font-weight: bold;
      margin: 0 0 8px 0;
      color: #222;
    }

    .card-description {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
      margin: 0 0 20px 0;
      flex-grow: 1;
    }

    .card-footer {
      border-top: 1px solid #f5f5f5;
      padding-top: 12px;
      font-size: 12px;
      color: #999;
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-footer strong { color: #333; }

    .cart-btn {
      background: #ffffff;
      border: 1px solid #ddd;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.2s;
    }

    .cart-btn:hover { background: #f0f0f0; }

    /* БОКОВАЯ ШТОРКА */
    .drawer-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
    }

    .drawer-overlay.active { opacity: 1; visibility: visible; }

    .drawer {
      position: fixed;
      top: 0;
      right: -450px;
      width: 100%;
      max-width: 450px;
      height: 100%;
      background: #fff;
      z-index: 1001;
      box-shadow: -5px 0 25px rgba(0,0,0,0.15);
      transition: right 0.3s ease-in-out;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 24px;
    }

    .drawer.active { right: 0; }

    .drawer-close {
      align-self: flex-end;
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #999;
    }

    .drawer-image-wrapper { display: flex; justify-content: center; margin-bottom: 20px; }
    .drawer-image-wrapper img { max-height: 150px; object-fit: contain; }

    .drawer-title { font-size: 24px; font-weight: bold; margin: 0 0 12px 0; color: #3b2314; }

    .section-label {
      font-size: 11px;
      font-weight: bold;
      color: #a38570;
      text-transform: uppercase;
      margin: 20px 0 8px 0;
      letter-spacing: 0.5px;
    }

    .info-box {
      background-color: var(--section-bg);
      border-radius: 8px;
      padding: 16px;
      font-size: 14px;
      line-height: 1.5;
      color: #4a4a4a;
      border-left: 4px solid #ebdcd0;
    }

    .server-flags-list {
      display: flex;
      gap: 8px;
      font-size: 20px;
      background: var(--section-bg);
      padding: 12px;
      border-radius: 8px;
    }

    .drawer-row { display: flex; gap: 15px; margin-top: 20px; }
    .drawer-col { flex: 1; }

    .status-box {
      background: var(--section-bg);
      padding: 14px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 15px;
      color: #614635;
      text-align: center;
    }

    .price-box {
      background: #e8f5e9;
      border: 1px solid #c8e6c9;
      padding: 14px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 16px;
      color: #2e7d32;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <span>🐴 Lowadi | Kaneri Mio Company</span>
</header>

<div class="container">
  <!-- Единая панель поиска и фильтров -->
  <div class="search-panel">
    <input type="text" id="search" class="search-input" placeholder="Поиск по названию...">
    
    <div class="search-filters">
      <!-- Фильтр по серверам -->
      <select id="serverFilter" class="search-select">
        <option value="all">Все сервера</option>
        <option value="🇷🇺">🇷🇺 RU</option>
        <option value="🇺🇦">🇺🇦 UA</option>
        <option value="🇫🇷">🇫🇷 FR</option>
        <option value="🇦🇶">🇦🇶 AQ</option>
      </select>

      <!-- Быстрые чекбоксы-переключатели -->
      <label class="search-checkbox-label">
        <input type="checkbox" id="stockFilter"> В наличии
      </label>
      <label class="search-checkbox-label">
        <input type="checkbox" id="rareFilter"> Редкое
      </label>
      <label class="search-checkbox-label">
        <input type="checkbox" id="hotFilter"> Горячее
      </label>
      <label class="search-checkbox-label">
        <input type="checkbox" id="newFilter"> Новое
      </label>
    </div>
  </div>

  <!-- Категории под поиском -->
  <div class="filters">
    <button class="filter-btn active" data-category="all">Все предметы</button>
    <button class="filter-btn" data-category="Черный рынок">Черный рынок</button>
    <button class="filter-btn" data-category="Валюта">Валюта</button>
    <button class="filter-btn" data-category="Окрасы">Окрасы</button>
    <button class="filter-btn" data-category="Другое">Другое</button>
  </div>

  <!-- Сетка карточек -->
  <div class="grid" id="products"></div>
</div>

<!-- Боковая шторка -->
<div class="drawer-overlay" id="overlay"></div>
<div class="drawer" id="drawer">
  <button class="drawer-close" id="closeDrawer">&times;</button>
  
  <div class="drawer-image-wrapper">
    <img id="d-image" src="" alt="">
  </div>
  
  <h2 class="drawer-title" id="d-name">Название</h2>
  <div class="tag" id="d-tag">Категория</div>

  <div class="section-label">Доступные сервера</div>
  <div class="server-flags-list" id="d-flags"></div>

  <div class="section-label">Описание</div>
  <div class="info-box" id="d-description">Описание предмета</div>

  <div class="section-label">Как получить</div>
  <div class="info-box" id="d-get">Способы получения</div>

  <div class="drawer-row">
    <div class="drawer-col">
      <div class="section-label">В наличии</div>
      <div class="status-box" id="d-count">0 шт</div>
    </div>
    <div class="drawer-col">
      <div class="section-label">Цена</div>
      <div class="price-box" id="d-price">0 ₽</div>
    </div>
  </div>
</div>

<script>
let itemsData = [];

// Элементы поиска и фильтров
const container = document.getElementById('products');
const searchInput = document.getElementById('search');
const serverSelect = document.getElementById('serverFilter');
const stockCheckbox = document.getElementById('stockFilter');
const rareCheckbox = document.getElementById('rareFilter');
const hotCheckbox = document.getElementById('hotFilter');
const newCheckbox = document.getElementById('newFilter');
const filterBtns = document.querySelectorAll('.filter-btn');

// Элементы шторки
const overlay = document.getElementById('overlay');
const drawer = document.getElementById('drawer');
const closeDrawerBtn = document.getElementById('closeDrawer');

let currentCategory = 'all';

// Загрузка данных
fetch('./items.json')
  .then(res => res.json())
  .then(data => {
    itemsData = data;
    renderItems();
  })
  .catch(err => console.error('Ошибка:', err));

// Функция отрисовки
function renderItems() {
  container.innerHTML = '';
  
  const query = searchInput.value.toLowerCase();
  const selectedServer = serverSelect.value;
  const filterStock = stockCheckbox.checked;
  const filterRare = rareCheckbox.checked;
  const filterHot = hotCheckbox.checked;
  const filterNew = newCheckbox.checked;

  const filtered = itemsData.filter(item => {
    // 1. Поиск по имени
    const matchesSearch = item.name.toLowerCase().includes(query);
    
    // 2. Поиск по вкладке категории
    const matchesCategory = currentCategory === 'all' || (item.category && item.category.toLowerCase() === currentCategory.toLowerCase());
    
    // 3. Поиск по серверу
    const matchesServer = selectedServer === 'all' || (item.servers && item.servers.includes(selectedServer));
    
    // 4. Дополнительные чекбоксы
    const matchesStock = !filterStock || (item.count && item.count > 0);
    const matchesRare = !filterRare || item.isRare === true;
    const matchesHot = !filterHot || item.isHot === true;
    const matchesNew = !filterNew || item.isNew === true;

    return matchesSearch && matchesCategory && matchesServer && matchesStock && matchesRare && matchesHot && matchesNew;
  });

  filtered.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';

    const tagClass = (item.category || 'другое').toLowerCase().replace(/\s+/g, '-');

    card.innerHTML = `
      <div class="image-wrapper">
        <img src="${item.image}" alt="${item.name}">
      </div>
      <div class="card-body">
        <div class="tag ${tagClass}">${item.category || 'Другое'}</div>
        <h3 class="card-title">${item.name}</h3>
        <p class="card-description">${item.description || ''}</p>
        <div class="card-footer">
          <span>В наличии: <strong>${item.count || 0} шт.</strong></span>
          <button class="cart-btn" title="Добавить в корзину">🛒</button>
        </div>
      </div>
    `;

    // Клик по корзине
    const cartBtn = card.querySelector('.cart-btn');
    cartBtn.addEventListener('click', (e) => {
      e.stopPropagation(); 
      alert(`Товар "${item.name}" добавлен в корзину!`);
    });

    // Клик по карточке открывает шторку
    card.addEventListener('click', () => openDrawer(item));
    container.appendChild(card);
  });
}

function openDrawer(item) {
  document.getElementById('d-image').src = item.image;
  document.getElementById('d-name').innerText = item.name;
  
  const tagEl = document.getElementById('d-tag');
  tagEl.innerText = item.category || 'Другое';
  tagEl.className = 'tag ' + (item.category || 'другое').toLowerCase().replace(/\s+/g, '-');

  document.getElementById('d-flags').innerText = (item.servers || []).join(' ');
  document.getElementById('d-description').innerText = item.description || 'Нет описания';
  document.getElementById('d-get').innerText = item.howto || 'Не указано';
  document.getElementById('d-count').innerText = `${item.count || 0} шт`;
  document.getElementById('d-price').innerText = `${item.price || 0}₽`;

  overlay.classList.add('active');
  drawer.classList.add('active');
}

function closeDrawer() {
  overlay.classList.remove('active');
  drawer.classList.remove('active');
}

closeDrawerBtn.addEventListener('click', closeDrawer);
overlay.addEventListener('click', closeDrawer);

// Слушатели событий на все элементы фильтрации
searchInput.addEventListener('input', renderItems);
serverSelect.addEventListener('change', renderItems);
stockCheckbox.addEventListener('change', renderItems);
rareCheckbox.addEventListener('change', renderItems);
hotCheckbox.addEventListener('change', renderItems);
newCheckbox.addEventListener('change', renderItems);

// Переключение категорий под поиском
filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCategory = btn.getAttribute('data-category');
    renderItems();
  });
});
</script>

</body>
</html>
