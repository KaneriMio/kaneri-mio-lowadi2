<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lowadi | Kaneri Mio Company</title>
  <style>
    :root {
      --bg-color: #f7ede2;
      --header-bg: #4a2810;
      --btn-active: #84522b;
      --btn-inactive: #eee4dc;
      --text-main: #2b2d42;
      --text-muted: #8d99ae;
      --card-bg: #ffffff;
      --tag-black-market: #a3704c;
      --tag-zm: #cfa846;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      margin: 0;
      background-color: var(--bg-color);
      color: var(--text-main);
    }

    /* Шапка сайта */
    header {
      background-color: var(--header-bg);
      color: #fff;
      padding: 15px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 18px;
    }

    header img {
      height: 24px;
      margin-right: 10px;
    }

    /* Главный контейнер */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px 15px;
    }

    /* Поиск */
    .search-container {
      margin-bottom: 20px;
    }

    .search-input {
      width: 100%;
      padding: 14px 20px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      color: #555;
    }

    .search-input::placeholder {
      color: #bbb;
    }

    /* Фильтры/Вкладки */
    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      overflow-x: auto;
      padding-bottom: 5px;
    }

    .filter-btn {
      background-color: var(--btn-inactive);
      color: #4a2a16;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .filter-btn:hover {
      opacity: 0.9;
    }

    .filter-btn.active {
      background-color: var(--btn-active);
      color: #fff;
    }

    /* Сетка товаров */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    /* Карточка товара */
    .card {
      background-color: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
    }

    .image-wrapper {
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-color: #fff;
    }

    .card img {
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
    }

    .card-body {
      padding: 20px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      border-top: 1px solid #f0f0f0;
    }

    /* Теги категорий */
    .tag {
      align-self: flex-start;
      font-size: 10px;
      font-weight: bold;
      text-transform: uppercase;
      padding: 4px 8px;
      border-radius: 4px;
      color: #fff;
      margin-bottom: 12px;
    }

    .tag.черный-рынок { background-color: var(--tag-black-market); }
    .tag.зя { background-color: var(--tag-zm); }
    .tag.изя { background-color: #5bc0be; }
    .tag.иные-масти { background-color: #6c757d; }

    .card-title {
      font-size: 18px;
      font-weight: bold;
      margin: 0 0 12px 0;
      color: #222;
    }

    .card-description {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
      margin: 0 0 20px 0;
      flex-grow: 1;
    }

    .card-footer {
      border-top: 1px solid #f5f5f5;
      padding-top: 12px;
      font-size: 12px;
      color: #999;
    }

    .card-footer strong {
      color: #333;
    }
  </style>
</head>
<body>

<header>
  <!-- Замените на иконку вашего логотипа, если она есть -->
  <span>🐴 Lowadi | Kaneri Mio Company</span>
</header>

<div class="container">
  <!-- Строка поиска -->
  <div class="search-container">
    <input type="text" id="search" class="search-input" placeholder="Поиск по названию...">
  </div>

  <!-- Кнопки фильтрации -->
  <div class="filters">
    <button class="filter-btn active" data-category="all">Все предметы</button>
    <button class="filter-btn" data-category="черный рынок">Черный рынок</button>
    <button class="filter-btn" data-category="зя">ЗЯ</button>
    <button class="filter-btn" data-category="изя">ИЗЯ</button>
    <button class="filter-btn" data-category="иные масти">Иные масти</button>
  </div>

  <!-- Контейнер для карточек -->
  <div class="grid" id="products"></div>
</div>

<script>
let itemsData = [];
const container = document.getElementById('products');
const searchInput = document.getElementById('search');
const filterBtns = document.querySelectorAll('.filter-btn');

let currentCategory = 'all';
let searchQuery = '';

// Загрузка данных
fetch('./items.json')
  .then(res => res.json())
  .then(data => {
    itemsData = data;
    renderItems();
  })
  .catch(err => console.error('Ошибка загрузки данных:', err));

// Функция отрисовки элементов
function renderItems() {
  container.innerHTML = '';
  
  const filtered = itemsData.filter(item => {
    const matchesSearch = item.name.toLowerCase().includes(searchQuery.toLowerCase());
    const matchesCategory = currentCategory === 'all' || item.category.toLowerCase() === currentCategory.toLowerCase();
    return matchesSearch && matchesCategory;
  });

  filtered.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';

    // Форматируем класс для тега (заменяем пробелы на дефисы)
    const tagClass = item.category.toLowerCase().replace(/\s+/g, '-');

    card.innerHTML = `
      <div class="image-wrapper">
        <img src="${item.image}" alt="${item.name}">
      </div>
      <div class="card-body">
        <div class="tag ${tagClass}">${item.category}</div>
        <h3 class="card-title">${item.name}</h3>
        <p class="card-description">${item.description || ''}</p>
        <div class="card-footer">
          В наличии: <strong>${item.count} шт.</strong>
        </div>
      </div>
    `;
    container.appendChild(card);
  });
}

// Обработка поиска
searchInput.addEventListener('input', (e) => {
  searchQuery = e.target.value;
  renderItems();
});

// Обработка фильтров
filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCategory = btn.getAttribute('data-category');
    renderItems();
  });
});
</script>

</body>
</html>
