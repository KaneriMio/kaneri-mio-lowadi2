<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lowadi | Kaneri Mio Company</title>
  <style>
    :root {
      --bg-color: #f7ede2;
      --header-bg: #4a2810;
      --btn-active: #84522b;
      --btn-inactive: #eee4dc;
      --text-main: #2b2d42;
      --card-bg: #ffffff;
      --tag-black-market: #a3704c;
      --tag-currency: #5bc0be;
      --tag-colors: #cfa846;
      --tag-other: #6c757d;
      --section-bg: #fdfaf7;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      margin: 0;
      background-color: var(--bg-color);
      color: var(--text-main);
      overflow-x: hidden;
    }

    header {
      background-color: var(--header-bg);
      color: #fff;
      padding: 15px 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      font-weight: bold;
      font-size: 18px;
    }

    header span { text-align: center; }

    .header-cart-btn {
      position: absolute;
      right: 30px;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
    }

    .header-cart-btn svg { width: 28px; height: 28px; fill: none; stroke: #fff; stroke-width: 2; }
    .cart-badge { position: absolute; top: -5px; right: -8px; background: #d32f2f; color: #fff; font-size: 11px; padding: 2px 6px; border-radius: 10px; }

    .container { max-width: 1200px; margin: 0 auto; padding: 30px 15px; }

    .search-panel {
      background: #fff; padding: 12px 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 20px;
    }

    .search-input { flex: 1; min-width: 200px; padding: 10px; border: 1px solid #eee; border-radius: 6px; font-size: 14px; outline: none; }
    .search-filters { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .search-select { padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; background-color: #fff; font-size: 13px; outline: none; color: #4a2a16; cursor: pointer; }

    .filters { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; }
    .filter-btn { background-color: var(--btn-inactive); color: #4a2a16; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; white-space: nowrap; }
    .filter-btn.active { background-color: var(--btn-active); color: #fff; }
<body>

<header>
  <span>🐴 Lowadi | Kaneri Mio Company</span>
  <button class="header-cart-btn" id="openCartBtn" title="Открыть корзину">
    <svg viewBox="0 0 24 24">
      <path d="M1 2h3.5l2.5 12h12l2-9H6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M7 14v4M11 14v4M15 14v4M19 14v4M7 14h12M7 16h12M7 18h12" stroke="#fff" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <circle cx="8" cy="21" r="1.5" fill="#fff"/>
      <circle cx="18" cy="21" r="1.5" fill="#fff"/>
    </svg>
    <div class="cart-badge" id="cartBadge">0</div>
  </button>
</header>

<div class="container">
  <!-- Панель поиска и выпадающих списков -->
  <div class="search-panel">
    <input type="text" id="search" class="search-input" placeholder="Поиск по названию...">
    <div class="search-filters">
      <select id="serverFilter" class="search-select">
        <option value="all">Все сервера</option>
        <option value="🇷🇺">🇷🇺 RU</option>
        <option value="🇺🇦">🇺🇦 UA</option>
        <option value="🇫🇷">🇫🇷 FR</option>
        <option value="🇦🇶">🇦🇶 AQ</option>
      </select>
      <select id="stockFilter" class="search-select">
        <option value="all">Все (в наличии и нет)</option>
        <option value="available">Только в наличии</option>
      </select>
      <select id="tagFilter" class="search-select">
        <option value="all">Все метки</option>
        <option value="new">Новинки (NEW)</option>
        <option value="limited">Редкие (Limited)</option>
        <option value="hot">Горячие (Hot)</option>
      </select>
    </div>
  </div>

  <!-- Главные Категории -->
  <div class="filters">
    <button class="filter-btn active" data-category="all">Все предметы</button>
    <button class="filter-btn" data-category="Черный рынок">Черный рынок</button>
    <button class="filter-btn" data-category="Валюта">Валюта</button>
    <button class="filter-btn" data-category="Окрасы">Окрасы</button>
    <button class="filter-btn" data-category="Другое">Другое</button>
  </div>

  <!-- Дополнительные Подстраницы (для ЗЯ и ИЗЯ) -->
  <div class="sub-filters" id="subFiltersContainer">
    <button class="sub-filter-btn active" data-subcategory="all">Все окрасы</button>
    <button class="sub-filter-btn" data-subcategory="ЗЯ">Каталог ЗЯ</button>
    <button class="sub-filter-btn" data-subcategory="ИЗЯ">Каталог ИЗЯ</button>
  </div>

  <!-- Сетка карточек -->
  <div class="grid" id="products"></div>
</div>

<div class="drawer-overlay" id="overlay"></div>
<!-- 1. ШТОРКА ИНФОРМАЦИИ О ТОВАРЕ -->
<div class="drawer" id="drawer">
  <button class="drawer-close" id="closeDrawer">&times;</button>
  <div class="drawer-image-wrapper">
    <img id="d-image" src="" alt="">
  </div>
  <h2 class="drawer-title" id="d-name">Название</h2>
  <div class="tag" id="d-tag">Категория</div>

  <!-- Блок примечания и мини-иконок админа -->
  <div id="d-note-container" style="display: none;">
    <div class="section-label">Примечание</div>
    <div class="info-box note-box">
      <div id="d-note-text">⚠️ Покупка только навесом</div>
      <!-- Сетка мини-иконок, которые выставляет админ -->
      <div class="admin-icons-grid" id="d-admin-icons"></div>
    </div>
  </div>

  <!-- Новое: Интерактивный блок выбора опций (ЧР, ФК, навыки) для Окрасов -->
  <div id="d-options-container" style="display: none;">
    <div class="section-label">Настройка окраса</div>
    <div class="option-select-block">
      <!-- Селектор предметов ЧР -->
      <div class="option-row" id="opt-cr-row" style="display: none;">
        <label for="opt-cr-select">Дополнительный ЧР:</label>
        <select id="opt-cr-select" class="option-select">
          <option value="none">Без предметов</option>
          <option value="Философский камень">Философский камень (+100₽)</option>
          <option value="Длань Фемиды">Длань Фемиды (+50₽)</option>
          <option value="Кровь Медузы">Кровь Медузы (+70₽)</option>
        </select>
      </div>
      <!-- Селектор ФК -->
      <div class="option-row" id="opt-fk-row" style="display: none;">
        <label for="opt-fk-select">ФК (Фон Кавалок):</label>
        <select id="opt-fk-select" class="option-select">
          <option value="none">Обычный фон</option>
          <option value="Летний пейзаж">Летний пейзаж (+30₽)</option>
          <option value="Зимняя сказка">Зимняя сказка (+40₽)</option>
        </select>
      </div>
      <!-- Селектор навыков -->
      <div class="option-row" id="opt-skills-row" style="display: none;">
        <label for="opt-skills-select">Комплект навыков:</label>
        <select id="opt-skills-select" class="option-select">
          <option value="none">Без навыков</option>
          <option value="100 навыков">100 навыков (+20₽)</option>
          <option value="500 навыков">500 навыков (+60₽)</option>
          <option value="1000 навыков">1000 навыков (+100₽)</option>
        </select>
      </div>
    </div>
  </div>

  <div class="section-label">Доступные сервера</div>
  <div class="server-flags-list" id="d-flags"></div>

  <div class="section-label">Описание</div>
  <div class="info-box" id="d-description">Описание предмета</div>

  <div class="section-label">Как получить</div>
  <div class="info-box" id="d-get">Способы получения</div>

  <div class="drawer-row">
    <div class="drawer-col">
      <div class="section-label">В наличии</div>
      <div class="status-box" id="d-count">0 шт</div>
    </div>
    <div class="drawer-col">
      <div class="section-label">Цена</div>
      <div class="price-box" id="d-price">0 ₽</div>
    </div>
  </div>

  <button class="drawer-buy-btn" id="drawerAddCartBtn">
    <svg viewBox="0 0 24 24">
      <path d="M1 2h3.5l2.5 12h12l2-9H6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <circle cx="8" cy="21" r="1.5" fill="#fff"/>
      <circle cx="18" cy="21" r="1.5" fill="#fff"/>
    </svg>
    Добавить в корзину
  </button>
</div>

<!-- 2. ШТОРКА КОРЗИНЫ -->
<div class="drawer" id="cartDrawer">
  <button class="drawer-close" id="closeCartDrawer">&times;</button>
  <h2 class="drawer-title">Ваша корзина</h2>
  
  <div class="cart-items-list" id="cartItemsContainer"></div>
  
  <div class="section-label" style="margin-top: 15px;">Итого к оплате</div>
  <div class="price-box" id="cartTotalPrice" style="font-size: 20px; padding: 15px; margin-bottom: 20px;">0 ₽</div>

  <div class="cart-footer-actions">
    <button class="buy-btn" id="checkoutBtn">Приобрести</button>
    <button class="clear-cart-btn" id="clearCartBtn" title="Очистить корзину">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        <line x1="10" y1="11" x2="10" y2="17"/>
        <line x1="14" y1="11" x2="14" y2="17"/>
      </svg>
    </button>
  </div>
</div>

<!-- ВСПЛЫВАЮЩЕЕ ОКНО ПРЕДУПРЕЖДЕНИЯ НАВЕСА -->
<div class="popup-modal" id="appleModal">
  <div class="popup-title">Внимание!</div>
  <div class="popup-text">Товар <strong>Золотое Яблоко</strong> продаётся только навесом. Пожалуйста, выберите нужную масть в нашем каталоге окрасов.</div>
  <div class="popup-actions">
    <button class="popup-btn popup-btn-catalog" id="modalGoCatalogBtn">В каталог</button>
    <button class="popup-btn popup-btn-close" id="modalCloseBtn">Закрыть</button>
  </div>
</div>

<!-- КАСТОМНОЕ УВЕДОМЛЕНИЕ -->
<div class="toast" id="cartToast">
  <span id="toastMessage">Товар добавлен в корзину!</span>
  <button class="toast-close" id="closeToastBtn">&times;</button>
</div>
<script>
let itemsData = [];
let cart = []; 
let activeItemForDrawer = null;

const container = document.getElementById('products');
const searchInput = document.getElementById('search');
const serverSelect = document.getElementById('serverFilter');
const stockSelect = document.getElementById('stockFilter');
const tagSelect = document.getElementById('tagFilter');
const filterBtns = document.querySelectorAll('.filter-btn');

const subFiltersContainer = document.getElementById('subFiltersContainer');
const subFilterBtns = document.querySelectorAll('.sub-filter-btn');

const overlay = document.getElementById('overlay');
const productDrawer = document.getElementById('drawer');
const cartDrawer = document.getElementById('cartDrawer');
const appleModal = document.getElementById('appleModal');
const closeDrawerBtn = document.getElementById('closeDrawer');
const openCartBtn = document.getElementById('openCartBtn');
const closeCartDrawerBtn = document.getElementById('closeCartDrawer');
const drawerAddCartBtn = document.getElementById('drawerAddCartBtn');

// Элементы настройки окрасов в шторке
const optCrRow = document.getElementById('opt-cr-row');
const optFkRow = document.getElementById('opt-fk-row');
const optSkillsRow = document.getElementById('opt-skills-row');
const optCrSelect = document.getElementById('opt-cr-select');
const optFkSelect = document.getElementById('opt-fk-select');
const optSkillsSelect = document.getElementById('opt-skills-select');

const modalGoCatalogBtn = document.getElementById('modalGoCatalogBtn');
const modalCloseBtn = document.getElementById('modalCloseBtn');

const cartItemsContainer = document.getElementById('cartItemsContainer');
const cartTotalPrice = document.getElementById('cartTotalPrice');
const cartBadge = document.getElementById('cartBadge');
const clearCartBtn = document.getElementById('clearCartBtn');
const checkoutBtn = document.getElementById('checkoutBtn');
const cartToast = document.getElementById('cartToast');
const toastMessage = document.getElementById('toastMessage');
const closeToastBtn = document.getElementById('closeToastBtn');

let currentCategory = 'all';
let currentSubCategory = 'all'; 
let toastTimeout;

// Загрузка
fetch('./items.json')
  .then(res => res.json())
  .then(data => {
    itemsData = data;
    renderItems();
  })
  .catch(err => console.error('Ошибка:', err));

// Отрисовка витрины по вашим правилам
function renderItems() {
  container.innerHTML = '';
  const query = searchInput.value.toLowerCase();
  const selectedServer = serverSelect.value;
  const stockValue = stockSelect.value;
  const tagValue = tagSelect.value;

  const filtered = itemsData.filter(item => {
    const matchesSearch = item.name.toLowerCase().includes(query);
    const matchesCategory = currentCategory === 'all' || (item.category && item.category.toLowerCase() === currentCategory.toLowerCase());
    
    let matchesSubCategory = true;
    if (currentCategory.toLowerCase() === 'окрасы' && currentSubCategory !== 'all') {
      matchesSubCategory = item.colorType && item.colorType.toLowerCase() === currentSubCategory.toLowerCase();
    }

    const matchesServer = selectedServer === 'all' || (item.servers && item.servers.includes(selectedServer));
    const matchesStock = stockValue === 'all' || (item.count && item.count > 0);
    
    let matchesTag = true;
    if (tagValue === 'new') matchesTag = item.isNew === true;
    if (tagValue === 'limited') matchesTag = item.isRare === true;
    if (tagValue === 'hot') matchesTag = item.isHot === true;

    return matchesSearch && matchesCategory && matchesSubCategory && matchesServer && matchesStock && matchesTag;
  });

  filtered.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    const tagClass = (item.category || 'другое').toLowerCase().replace(/\s+/g, '-');
    const isOutOfStock = !item.count || item.count === 0;

    let badgeHtml = '';
    if (item.isNew) badgeHtml = '<span class="badge new">NEW</span>';
    else if (item.isHot) badgeHtml = '<span class="badge hot">Hot</span>';
    else if (item.isRare) badgeHtml = '<span class="badge limited">Limited</span>';

    // Формируем уникальные строки под каждый тип окраса
    let cardMetaHtml = '';
    if (item.category && item.category.toLowerCase() === 'окрасы') {
      const type = (item.colorType || 'ЗЯ').toUpperCase();
      if (type === 'ЗЯ') {
        cardMetaHtml = `<div class="card-meta-text">Автор: <span>${item.author || 'Не указан'}</span></div>`;
      } else if (type === 'ИЗЯ') {
        cardMetaHtml = `
          <div class="card-meta-text">Автор: <span>${item.author || 'Не указан'}</span></div>
          <div class="card-meta-text">Копий: <span>${item.copies || 0} шт.</span></div>
        `;
      }
    }

    const inCart = cart.find(c => c.id === item.id);

    let actionHtml = '';
    if (isOutOfStock) {
      actionHtml = `<button class="cart-btn" style="background:#ccc; cursor:not-allowed;" disabled><svg viewBox="0 0 24 24"><path d="M1 2h3.5l2.5 12h12l2-9H6" stroke="#fff" stroke-width="2" fill="none"/></svg></button>`;
    } else if (inCart) {
      actionHtml = `
        <div class="card-qty-controls" onclick="event.stopPropagation();">
          <button class="card-qty-btn" onclick="changeQty('${item.id}', -1)">-</button>
          <span class="card-qty-value">${inCart.quantity}</span>
          <button class="card-qty-btn" onclick="changeQty('${item.id}', 1)">+</button>
        </div>
      `;
    } else {
      actionHtml = `
        <button class="cart-btn" title="Добавить в корзину">
          <svg viewBox="0 0 24 24">
            <path d="M1 2h3.5l2.5 12h12l2-9H6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <path d="M7 14h12M7 16h12M7 18h12" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="8" cy="21" r="1.5" fill="#fff"/>
            <circle cx="18" cy="21" r="1.5" fill="#fff"/>
          </svg>
        </button>
      `;
    }

    card.innerHTML = `
      <div class="image-wrapper">
        ${badgeHtml}
        <img src="${item.image}" alt="${item.name}">
      </div>
      <div class="card-body">
        <div class="tag ${tagClass}">${item.category || 'Другое'}</div>
        <h3 class="card-title">${item.name}</h3>
        ${cardMetaHtml}
        <p class="card-description">${item.description || ''}</p>
        <div style="font-size: 16px; font-weight: bold; color: #2e7d32; margin-bottom: 12px;">${item.price || 0} ₽</div>
        <div class="card-footer ${isOutOfStock ? 'out-of-stock' : ''}">
          <span>В наличии: <strong>${item.count || 0} шт.</strong></span>
          ${actionHtml}
        </div>
      </div>
    `;

    if (!isOutOfStock && !inCart) {
      const cartBtn = card.querySelector('.cart-btn');
      cartBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        addToCart(item);
      });
    }

    card.addEventListener('click', () => openProductDrawer(item));
    container.appendChild(card);
  });
}

function addToCart(item) {
  if (item.name.trim().toLowerCase() === 'золотое яблоко') {
    productDrawer.classList.remove('active');
    overlay.classList.add('active');
    appleModal.classList.add('active');
    return;
  }

  // Считываем выбранные опции из шторки (если товар добавляется через неё)
  let selectedCr = "none";
  let selectedFk = "none";
  let selectedSkills = "none";
  let extraCost = 0;

  if (activeItemForDrawer && activeItemForDrawer.id === item.id) {
    selectedCr = optCrSelect.value;
    selectedFk = optFkSelect.value;
    selectedSkills = optSkillsSelect.value;

    if (selectedCr === "Философский камень") extraCost += 100;
    if (selectedCr === "Длань Фемиды") extraCost += 50;
    if (selectedCr === "Кровь Медузы") extraCost += 70;
    if (selectedFk === "Летний пейзаж") extraCost += 30;
    if (selectedFk === "Зимняя сказка") extraCost += 40;
    if (selectedSkills === "100 навыков") extraCost += 20;
    if (selectedSkills === "500 навыков") extraCost += 60;
    if (selectedSkills === "1000 навыков") extraCost += 100;
  }

  // Создаем уникальный ключ для товара в корзине с учётом его кастомной сборки
  const cartItemId = `${item.id}_${selectedCr}_${selectedFk}_${selectedSkills}`;
  const existingProduct = cart.find(cartItem => cartItem.cartKey === cartItemId);
  
  if (existingProduct) {
    if (existingProduct.quantity >= item.count) {
      showToast(`В наличии всего ${item.count} шт.`);
      return;
    }
    existingProduct.quantity++;
  } else {
    cart.push({ 
      ...item, 
      cartKey: cartItemId,
      price: item.price + extraCost, // Добавляем наценку к базовой стоимости
      chosenCr: selectedCr,
      chosenFk: selectedFk,
      chosenSkills: selectedSkills,
      quantity: 1 
    });
  }
  
  updateCartUI();
  renderItems();
  showToast(`Товар "${item.name}" добавлен в корзину!`);
}
// Функция обновления интерфейса корзины с кастомными сборками
function updateCartUI() {
  cartItemsContainer.innerHTML = '';
  let total = 0;
  let totalItemsCount = 0;

  cart.forEach(item => {
    total += item.price * item.quantity;
    totalItemsCount += item.quantity;

    const cartItemEl = document.createElement('div');
    cartItemEl.className = 'cart-item';

    // Формирование метаданных для категории Окрасы (ЗЯ/ИЗЯ)
    let optionsMetaHtml = '';
    if (item.category && item.category.toLowerCase() === 'окрасы') {
      const type = (item.colorType || 'ЗЯ').toUpperCase();
      let extraInfo = `<div>Автор: ${item.author || 'Не указан'}</div>`;
      if (type === 'ИЗЯ') {
        extraInfo += `<div>Копий: ${item.copies || 0} шт.</div>`;
      }
      
      let addons = [];
      if (item.chosenCr !== 'none') addons.push(`ЧР: ${item.chosenCr}`);
      if (item.chosenFk !== 'none') addons.push(`Фон: ${item.chosenFk}`);
      if (item.chosenSkills !== 'none') addons.push(item.chosenSkills);
      
      let addonsText = addons.length > 0 ? `<div style="color: #2e7d32; font-weight: 500; margin-top: 2px;">+ ${addons.join(', ')}</div>` : '';
      optionsMetaHtml = `<div class="cart-item-meta" style="color:#b17a53; font-weight:bold; margin-top:4px;">Категория: ${type}</div>${extraInfo}${addonsText}`;
    }

    cartItemEl.innerHTML = `
      <img src="${item.image}" alt="${item.name}">
      <div class="cart-item-details">
        <div class="cart-item-name">${item.name}</div>
        ${optionsMetaHtml}
        <div class="cart-item-price" style="margin-top:4px;">${item.price * item.quantity} ₽</div>
        <div class="quantity-controls">
          <button class="qty-btn" onclick="changeQtyByKey('${item.cartKey}', -1)">-</button>
          <span style="font-size: 13px; font-weight: bold; min-width: 15px; text-align: center;">${item.quantity}</span>
          <button class="qty-btn" onclick="changeQtyByKey('${item.cartKey}', 1)">+</button>
        </div>
      </div>
      <button class="remove-item-btn" onclick="removeFromCartByKey('${item.cartKey}')">&times;</button>
    `;
    cartItemsContainer.appendChild(cartItemEl);
  });

  cartTotalPrice.innerText = `${total} ₽`;
  cartBadge.innerText = totalItemsCount;
}

// Изменение количества товара по ключу сборки
window.changeQtyByKey = function(key, change) {
  const item = cart.find(i => i.cartKey === key);
  if (!item) return;
  
  const originalItem = itemsData.find(i => i.id === item.id);
  const newQty = item.quantity + change;

  if (newQty <= 0) {
    removeFromCartByKey(key);
    return;
  }
  if (originalItem && newQty > originalItem.count) {
    showToast(`Максимальное количество на складе: ${originalItem.count} шт.`);
    return;
  }

  item.quantity = newQty;
  updateCartUI();
  renderItems();
};

// Изменение количества кнопками на самой карточке витрины
window.changeQty = function(id, change) {
  const item = cart.find(i => i.id === id);
  if (item) {
    changeQtyByKey(item.cartKey, change);
  }
};

// Удаление по уникальному ключу
window.removeFromCartByKey = function(key) {
  cart = cart.filter(i => i.cartKey !== key);
  updateCartUI();
  renderItems();
  showToast('Товар удален из корзины.');
};

clearCartBtn.addEventListener('click', () => {
  if (cart.length === 0) return;
  cart = [];
  updateCartUI();
  renderItems();
  showToast('Корзина полностью очищена.');
});

checkoutBtn.addEventListener('click', () => {
  if (cart.length === 0) {
    showToast('Ваша корзина пуста!');
    return;
  }
  alert('Заказ успешно оформлен! Спасибо за покупку.');
  cart = [];
  updateCartUI();
  renderItems();
  closeAllDrawers();
});
function showToast(msg) {
  clearTimeout(toastTimeout);
  toastMessage.innerText = msg;
  cartToast.classList.add('show');
  toastTimeout = setTimeout(hideToast, 1500);
}

function hideToast() { cartToast.classList.remove('show'); }
closeToastBtn.addEventListener('click', hideToast);

// Открытие инфо-шторки с проверками ЗЯ/ИЗЯ и рендером иконок админа
function openProductDrawer(item) {
  activeItemForDrawer = item;
  cartDrawer.classList.remove('active');
  
  document.getElementById('d-image').src = item.image;
  document.getElementById('d-name').innerText = item.name;
  
  const tagEl = document.getElementById('d-tag');
  tagEl.innerText = item.category || 'Другое';
  tagEl.className = 'tag ' + (item.category || 'другое').toLowerCase().replace(/\s+/g, '-');

  // Проверка Золотого Яблока и генерация мини-иконок админа
  const noteContainer = document.getElementById('d-note-container');
  const noteText = document.getElementById('d-note-text');
  const adminIconsGrid = document.getElementById('d-admin-icons');
  adminIconsGrid.innerHTML = ''; 

  if (item.name.trim().toLowerCase() === 'золотое яблоко') {
    noteText.innerText = '⚠️ Покупка только навесом';
    noteContainer.style.display = 'block';
  } else if (item.adminIcons && item.adminIcons.length > 0) {
    noteText.innerText = 'В комплекте с этим окрасом идут предметы:';
    item.adminIcons.forEach(iconUrl => {
      const img = document.createElement('img');
      img.className = 'admin-mini-icon';
      img.src = iconUrl;
      adminIconsGrid.appendChild(img);
    });
    noteContainer.style.display = 'block';
  } else {
    noteContainer.style.display = 'none';
  }

  // Отображение выпадающих списков настройки (только для Окрасов)
  const optionsContainer = document.getElementById('d-options-container');
  if (item.category && item.category.toLowerCase() === 'окрасы') {
    optCrSelect.value = 'none';
    optFkSelect.value = 'none';
    optSkillsSelect.value = 'none';

    optCrRow.style.display = item.hasExtraCr ? 'flex' : 'none';
    optFkRow.style.display = item.hasFk ? 'flex' : 'none';
    optSkillsRow.style.display = item.hasSkills ? 'flex' : 'none';

    optionsContainer.style.display = (item.hasExtraCr || item.hasFk || item.hasSkills) ? 'block' : 'none';
  } else {
    optionsContainer.style.display = 'none';
  }

  // Форматирование описания под правила ЗЯ / ИЗЯ (выводим сервера в шторку)
  const descBox = document.getElementById('d-description');
  const availableServersText = (item.servers && item.servers.length > 0) ? item.servers.join(', ') : 'Нет в наличии';
  
  if (item.category && item.category.toLowerCase() === 'окрасы') {
    const type = (item.colorType || 'ЗЯ').toUpperCase();
    let metaDescription = `<strong>Категория:</strong> ${type}<br><strong>Автор:</strong> ${item.author || 'Не указан'}<br>`;
    if (type === 'ИЗЯ') {
      metaDescription += `<strong>Всего копий масти:</strong> ${item.copies || 0} шт.<br>`;
    }
    metaDescription += `<strong>Доступно на серверах:</strong> ${availableServersText}<br><br>`;
    metaDescription += `<strong>Описание масти:</strong><br>${item.description || 'Нет описания'}`;
    descBox.innerHTML = metaDescription;
  } else {
    descBox.innerText = item.description || 'Нет описания';
  }

  document.getElementById('d-flags').innerText = (item.servers || []).join(' ');
  document.getElementById('d-count').innerText = `${item.count || 0} шт`;
  document.getElementById('d-price').innerText = `${item.price || 0}₽`;

  if (!item.count || item.count === 0) {
    drawerAddCartBtn.style.background = '#ccc';
    drawerAddCartBtn.style.cursor = 'not-allowed';
    drawerAddCartBtn.innerText = 'Нет в наличии';
  } else {
    drawerAddCartBtn.style.background = '#2e7d32';
    drawerAddCartBtn.style.cursor = 'pointer';
    drawerAddCartBtn.innerHTML = `
      <svg viewBox="0 0 24 24">
        <path d="M1 2h3.5l2.5 12h12l2-9H6" stroke="#fff" stroke-width="2" fill="none"/>
        <circle cx="8" cy="21" r="1.5" fill="#fff"/>
        <circle cx="18" cy="21" r="1.5" fill="#fff"/>
      </svg> Добавить в корзину`;
  }

  overlay.classList.add('active');
  productDrawer.classList.add('active');
}

drawerAddCartBtn.addEventListener('click', () => {
  if (!activeItemForDrawer || !activeItemForDrawer.count || activeItemForDrawer.count === 0) return;
  addToCart(activeItemForDrawer);
});

function openCartDrawer() {
  productDrawer.classList.remove('active'); 
  overlay.classList.add('active');
  cartDrawer.classList.add('active');
}

function closeAllDrawers() {
  overlay.classList.remove('active');
  productDrawer.classList.remove('active');
  cartDrawer.classList.remove('active');
  appleModal.classList.remove('active');
}

modalCloseBtn.addEventListener('click', () => {
  appleModal.classList.remove('active');
  overlay.classList.remove('active');
});

modalGoCatalogBtn.addEventListener('click', () => {
  appleModal.classList.remove('active');
  filterBtns.forEach(b => b.classList.remove('active'));
  const colorsBtn = Array.from(filterBtns).find(b => b.getAttribute('data-category') === 'Окрасы');
  if (colorsBtn) {
    colorsBtn.classList.add('active');
    currentCategory = 'Окрасы';
    subFiltersContainer.style.display = 'flex';
  }
  subFilterBtns.forEach(sb => sb.classList.remove('active'));
  subFilterBtns[0].classList.add('active');
  currentSubCategory = 'all';
  renderItems();
});

openCartBtn.addEventListener('click', openCartDrawer);
closeDrawerBtn.addEventListener('click', closeAllDrawers);
closeCartDrawerBtn.addEventListener('click', closeAllDrawers);
overlay.addEventListener('click', closeAllDrawers);

searchInput.addEventListener('input', renderItems);
serverSelect.addEventListener('change', renderItems);
stockSelect.addEventListener('change', renderItems);
tagSelect.addEventListener('change', renderItems);

filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCategory = btn.getAttribute('data-category');
    
    if (currentCategory.toLowerCase() === 'окрасы') {
      subFiltersContainer.style.display = 'flex';
    } else {
      subFiltersContainer.style.display = 'none';
      currentSubCategory = 'all';
    }
    renderItems();
  });
});

subFilterBtns.forEach(sBtn => {
  sBtn.addEventListener('click', () => {
    subFilterBtns.forEach(b => b.classList.remove('active'));
    sBtn.classList.add('active');
    currentSubCategory = sBtn.getAttribute('data-subcategory');
    renderItems();
  });
});
</script>

</body>
</html>
