<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lowadi Shop</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #222;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .card-body {
      padding: 10px;
    }

    .price {
      font-weight: bold;
      color: green;
    }
  </style>
</head>
<body>

<header>
  <h1>Lowadi Shop</h1>
</header>

<div class="grid" id="products"></div>

<script>
fetch('./items.json')
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById('products');

    data.forEach(item => {
      const card = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `
        <img src="${item.image}" alt="${item.name}">
        <div class="card-body">
          <h3>${item.name}</h3>
          <p class="price">${item.price} монет</p>
          <small>${item.category || ''}</small>
        </div>
      `;

      container.appendChild(card);
    });
  });
</script>

</body>
</html>
